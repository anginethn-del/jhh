<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Solicitud Enviada — Banco Guayaquil</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="header">
  <a class="header-logo" href="#">
    <svg class="lsvg" width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="18" fill="white" fill-opacity="0.15"/>
      <circle cx="18" cy="18" r="13" stroke="white" stroke-width="3" fill="none"/>
      <circle cx="18" cy="18" r="6" fill="white"/>
    </svg>
    <div class="header-brand">Banco<span>Guayaquil</span></div>
  </a>
</header>

<main class="container" style="text-align:center;padding-top:48px">
  <div style="width:80px;height:80px;background:rgba(46,125,50,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" stroke="#2E7D32" stroke-width="2"/>
      <path d="M8 12l3 3 5-5" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1 style="font-size:24px;font-weight:800;color:var(--gray-900);margin-bottom:10px">¡Solicitud enviada!</h1>
  <p style="font-size:14px;color:var(--gray-600);line-height:1.6;max-width:300px;margin:0 auto 32px">Tu solicitud de aumento de cupo ha sido recibida. Te notificaremos al correo y teléfono registrados.</p>
  <div class="card" style="text-align:left">
    <p style="font-size:13px;font-weight:700;margin-bottom:12px">Resumen de tu solicitud</p>
    <div id="res" style="display:flex;flex-direction:column;gap:8px;font-size:13px;color:var(--gray-600)"></div>
  </div>
  <button class="btn btn-primary" style="margin-top:16px" onclick="Session.clear();window.location.href='index1.html'">
    Nueva solicitud
  </button>
</main>

<script src="app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  const p = Session.get('personal') || {};
  const c = Session.get('cupo')     || {};
  document.getElementById('res').innerHTML = `
    <div style="display:flex;justify-content:space-between"><span>Nombre</span><b style="color:var(--gray-900)">${p.nombre||'—'}</b></div>
    <div style="display:flex;justify-content:space-between"><span>Cédula</span><b style="color:var(--gray-900)">${p.cedula||'—'}</b></div>
    <div style="display:flex;justify-content:space-between"><span>Correo</span><b style="color:var(--gray-900)">${p.email||'—'}</b></div>
    <div style="display:flex;justify-content:space-between"><span>Monto solicitado</span><b style="color:var(--pink)">$${c.monto||'—'}</b></div>
  `;
});
</script>
</body>
</html>
